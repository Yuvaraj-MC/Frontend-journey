<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>

    <style>
        .nameError,
        .gmailError,
        .phoneError {
            color: red;
            display: none;
        }
    </style>
</head>

<body>

    <div>
        <form action="">
            <input type="text" placeholder="Name" id="name">
            <span class="nameError">Name must contains only letter</span><br>
            <input type="text" placeholder="Email" id="email">
            <span class="gmailError">Please provide the valid Gmail address</span><br>
            <input type="text" placeholder="PhoneNo" id="phone">
            <span class="phoneError">Phone number Must contains only 10 digits</span> <br>
            <input type="submit" id="Submit">
        </form>
    </div>

    <script>
        var submit = document.getElementById("Submit")
        submit.addEventListener("click", function (event) {
            event.preventDefault();

            var nameRegex = /^[a-zA-Z]+$/;
            var emailRegex = /^[a-zA-Z0-9]+@gmail\.com$/;
            var phoneRegex = /^\d{10}$/;

            var nameInput = document.getElementById("name");
            var emailInput = document.getElementById("email");
            var phoneInput = document.getElementById("phone");


            var validate = true;

            if (nameRegex.test(nameInput.value) === false) {
                validate = false;
                document.querySelector(".nameError").style.display = "inline";
            } else {
                document.querySelector(".nameError").style.display = "none";
            }

            if (emailRegex.test(emailInput.value) === false) {
                validate = false;
                document.querySelector(".gmailError").style.display = "inline";
            } else {
                document.querySelector(".gmailError").style.display = "none";

            }

            if (phoneRegex.test(phoneInput.value) === false) {
                validate = false;
                document.querySelector(".phoneError").style.display = "inline";
            } else {
                document.querySelector(".phoneError").style.display = "none";
            }

            if (validate === true) {
                alert("Form submitted successfully!");
            }
        });
    </script>
</body>

</html>
