<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
</head>

<body>
    <input type="text" id="search">
    <div class="container">
        <h1>One</h1>
        <h1>Two</h1>
        <h1>Three</h1>
        <h1>Four</h1>
        <h1>Five</h1>
        <h1>Six</h1>
        <h1>Seven</h1>
        <h1>Eight</h1>
        <h1>Nine</h1>
        <h1>Ten</h1>
    </div>


    <script>

        var searchInput = document.getElementById('search');
        var container = document.querySelector(".container");
        var h1List = document.querySelectorAll("h1");
        // console.log(h1List); list vunna h1 tags anni chudachu
        searchInput.addEventListener("keyup", function (event) {

            var enteredText = event.target.value.toUpperCase();

            for (count = 0; count < h1List.length; count++) {

                if (h1List[count].textContent.toUpperCase().indexOf(enteredText) < 0) {

                    h1List[count].style.display = "none";

                } else {

                    h1List[count].style.display = "block";

                }
            }
        })

        // search input field ni select chestunna and container ni select chestunna andhulo unna h1 tags ni select chestunna
        // querySelector All endhuku use chestunna ante container lo unna h1 tags anni select cheyyali and querySelector
        // only first h1 tag ni select chestundi
        // querySelector All endhuku use chestunna ante container lo unna h1 tags anni select cheyyali and querySelector
        // only first h1 tag ni select chestundi
        // h1List is an array of all the h1 tags in the container
        // event.target.value endhuku use chestunna ante search input field lo user enter chese text ni access cheyyali and
        // event.target.value lo user enter chese text untundhi
    </script>


</body>

</html>
