        var checkboxes = document.getElementsByName("check");
        // skill array is created
        skill = [];
        for (count = 0; count < checkboxes.length; count++) {
            checkboxes[count].addEventListener("click", function () {
                if (this.checked) {
                    console.log("Checked");
                    skill.push(this.value);
                    result.textContent = skill;
                } else {
                    console.log("Unchecked");
                    // index find chesi skill array nundi remove cheyali
                    var index = skill.indexOf(this.value);//0
                    // zero index nundi 1 element remove cheyali
                    skill.splice(index, 1);
                    // skill array ni result lo display cheyali
                    result.textContent = skill;

                }
            });

        }


    </script>
